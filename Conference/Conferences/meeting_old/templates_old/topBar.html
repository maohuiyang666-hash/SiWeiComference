<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/layui.css"  media="all">
    <title>头部</title>
    <style type="text/css">
    .top-container {
	width: 100%;
	height: 40px;
	background: #333;
    }

    .top-bar {
        position: relative;
        width: 1226px;
        margin: 0 auto;
        font-size: 12px;
    z-index: 11;
    }

    .topbar-nav {
        float: left;
        display: inline-block;
        height: 40px;
        line-height: 40px;
        overflow: hidden;
    }

    .nav-wrap {
        display: inline-block;
        margin: 0;
        padding: 0;
        list-style: none;
        .nav {
            display: inline-block;
            text-decoration: none;
            height: 40px;
            line-height: 40px;
            padding-left: 5px;
            & :hover {
                color: #fff;
            }
            .nav-name {
                display: inline-block;
                font-size: 12px;
                color: #b0b0b0;
                text-decoration: none;
            }
            .nav-separate {
                display: inline-block;
                color: #b0b0b0;
                margin-left: 5px;
            }
        }
    }

    .topbar-info {
        position: absolute;
        top: 0;
        right: 140px;
        height: 40px;
        line-height: 40px;
        a {
            color: #b0b0b0;
            text-decoration: none;
        &:hover {
        color: #fff;
        }
        }
        span {
            color: #b0b0b0;
        }
    }
    .fadein-transition {
    transition: all .5s ease;
    height: 96px;
    }

    .fadein-enter, .fadein-leave {
    height: 0;
    }
    .pic-gif {
        width: 400px;
        height: 80px;
        margin-left: 10px;
        background: url('../static/image/logo.jpg');
        background-size: 100% 100%;
    }
    </style>
</head>
<body>
    <header class="top-container">
		<div class="top-bar clearfix">
			<div class="topbar-nav">
				<ul class="nav-wrap">
                    <li class="nav clearfix">
                        <a class="nav-name" style="color:#fff;">关于我们</a><span class="nav-separate">|</span>
                        <a class="nav-name" style="color: #fff;">联系我们</a><span class="nav-separate">|</span>
                        <a class="nav-name" style="color: #fff;">问题反馈</a><span class="nav-separate">|</span>
                    </li>
                </ul>
            </div>
            <div class="topbar-info">
                <a href="" style="color: #fff;">登陆</a><span class="nav-separate">|</span>
                <a href="" style="color: #fff;">注册</a>
            </div>
        </div>
        
    </header>
    <div class="top-header">
        <div class="container">
            <a href="#" class="pic-gif"></a>
            <div class="header-navs">
                <ul class="navs">
                    <li class="nav">
                        <a href="javascript: void(0);" class="nav-item">关于SANS</a>
                        <a href="javascript: void(0);" class="nav-item">会议</a>
                        <a href="javascript: void(0);" class="nav-item">会员</a>
                        <a href="javascript: void(0);" class="nav-item">活动</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
