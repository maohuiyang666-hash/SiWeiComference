<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>主讲嘉宾</title>
        <link href="{{ url_for('static',filename='home/css/convip.css') }}" rel="stylesheet" type="text/css"/>
    </head>
    <body>
        <div class="case-container">
            <div class="case-index-title">
                <h2>主讲嘉宾</h2>
                <a href="javascript:;">全部嘉宾</a>
            </div>
            <div class="case-index-content">
                <ul class="clearfix">
                    {% for c in con %}
                    <li class="case-example-item">
                        <a href="#">
                            <img src="{{c[5]}}" alt="" class="case-pad">
                            <div class="case-item-info">
                                <div class="case-info-logo">{{c[3]}}</div>
                                <div class="case-info-title">{{c[2]}}</div>
                                <div class="case-info-text">{{c[4]}}</div>
                            </div>

                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>

    </body>
</html>
